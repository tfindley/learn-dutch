services:
  learn-dutch:
    build:
      context: .
      dockerfile: Dockerfile
      # args:
      #   CA_CERT_URL: https://your-internal-ca/ca.crt
      #   VITE_GA_ID: G-XXXXXXXXXX
    image: learn-dutch:latest
    container_name: learn-dutch-dev
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
