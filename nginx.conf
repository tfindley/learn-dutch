server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Serve pre-built assets; fall back to index.html for client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed assets aggressively; index.html must never be cached.
    location ~* \.(js|css|woff2?|png|jpg|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # Health-check endpoint used by the CI test step.
    location = /healthz {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
