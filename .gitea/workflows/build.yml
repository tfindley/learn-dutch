# =============================================================================
# CI/CD — Build, test, and push container image
# =============================================================================
#
# OVERVIEW
# --------
# Single-arch build targeting the x86_64 `docker` runner.
# Pipeline: build image → test it → push to Gitea registry.
# Running tests before pushing ensures a broken image is never published.
#
# RUNNER
# ------
#   docker  — x86_64 Linux runner (gitea/act_runner, Alpine-based)
#
# SECRETS (set in Repository → Settings → Actions → Secrets)
# -------
# Required:
#   CI_REGISTRY_HOST   — Registry hostname (e.g. code.findley.pm)
#   CI_REGISTRY_USER   — Registry username
#   CI_REGISTRY_TOKEN  — Registry password / personal access token
#
# Optional:
#   CA_CERT_URL  — URL to an internal CA certificate bundle. Passed to
#                  `docker build` so the Node build stage can fetch npm
#                  packages through an internal proxy with a private CA.
# =============================================================================

name: Build Container Image

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths-ignore:
      - "*.md"
  workflow_dispatch:

jobs:

  # ===========================================================================
  # JOB: build-test-push
  # ===========================================================================
  build-test-push:

    runs-on:
      - docker

    steps:

      # Install tools required by subsequent steps.
      # nodejs  — required by the actions/checkout JavaScript action
      # docker-cli — the `docker` command (client only, no daemon)
      - name: Install prerequisites
        shell: sh
        run: |
          set -eu
          apk add --no-cache git nodejs docker-cli docker-cli-buildx

      - name: Checkout
        uses: https://github.com/actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Log in to registry
        env:
          CI_REGISTRY_HOST:  ${{ secrets.CI_REGISTRY_HOST }}
          CI_REGISTRY_USER:  ${{ secrets.CI_REGISTRY_USER }}
          CI_REGISTRY_TOKEN: ${{ secrets.CI_REGISTRY_TOKEN }}
        run: |
          set -eu
          [ -n "${CI_REGISTRY_HOST:-}" ] || { echo "CI_REGISTRY_HOST missing"; exit 1; }
          echo "$CI_REGISTRY_TOKEN" | docker login "$CI_REGISTRY_HOST" \
            -u "$CI_REGISTRY_USER" --password-stdin

      # -----------------------------------------------------------------------
      # BUILD
      # -----------------------------------------------------------------------
      - name: Build image
        shell: sh
        env:
          CI_REGISTRY_HOST: ${{ secrets.CI_REGISTRY_HOST }}
          REPO_OWNER:       ${{ github.repository_owner }}
          REPO_NAME:        ${{ github.event.repository.name }}
          COMMIT_SHA:       ${{ github.sha }}
          CA_CERT_URL:      ${{ secrets.CA_CERT_URL }}
        run: |
          set -eu

          IMAGE_BASE=$(printf "%s/%s/%s" "$CI_REGISTRY_HOST" "$REPO_OWNER" "$REPO_NAME" \
            | tr '[:upper:]' '[:lower:]')

          SHA_SHORT=$(echo "$COMMIT_SHA" | cut -c1-12)
          SHA_TAG="${IMAGE_BASE}:sha-${SHA_SHORT}"

          BUILD_ARGS=""
          if [ -n "${CA_CERT_URL:-}" ]; then
            BUILD_ARGS="--build-arg CA_CERT_URL=${CA_CERT_URL}"
          fi

          # shellcheck disable=SC2086
          docker build \
            -t "${SHA_TAG}" \
            --load \
            ${BUILD_ARGS} \
            --label "org.opencontainers.image.source=${GITHUB_SERVER_URL:-}/${GITHUB_REPOSITORY:-}" \
            --label "org.opencontainers.image.revision=${COMMIT_SHA}" \
            --label "org.opencontainers.image.created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            .

          echo "${SHA_TAG}" > /tmp/image_tag
          echo "${IMAGE_BASE}" > /tmp/image_base

      # -----------------------------------------------------------------------
      # TEST
      # -----------------------------------------------------------------------
      # The act_runner is itself a container. Port-publishing (-p host:container)
      # exposes ports on the *host*, not inside the runner — so localhost:<port>
      # won't reach the test container. Instead we start the container without
      # port-publishing and connect directly to its bridge IP on port 80.
      - name: Test — nginx serves app
        shell: sh
        run: |
          set -eu
          IMAGE=$(cat /tmp/image_tag)
          echo "Testing image: ${IMAGE}"

          # Test nginx configuration is valid.
          docker run --rm "${IMAGE}" nginx -t
          echo "nginx config: OK"

          # Test that the built assets exist in the image.
          docker run --rm "${IMAGE}" ls /usr/share/nginx/html/index.html
          echo "index.html: OK"

          docker run --rm "${IMAGE}" sh -c '
            ls /usr/share/nginx/html/assets/*.js | head -1 | grep -q "." \
              || { echo "No JS assets found"; exit 1; }
            echo "JS assets: OK"
          '

      # -----------------------------------------------------------------------
      # PUSH
      # -----------------------------------------------------------------------
      # Push the sha-specific tag and update :latest.
      # On a version tag push, also publish the version tag.
      - name: Push image
        shell: sh
        env:
          COMMIT_SHA: ${{ github.sha }}
        run: |
          set -eu
          SHA_TAG=$(cat /tmp/image_tag)
          IMAGE_BASE=$(cat /tmp/image_base)

          docker push "${SHA_TAG}"
          echo "Pushed: ${SHA_TAG}"

          docker tag "${SHA_TAG}" "${IMAGE_BASE}:latest"
          docker push "${IMAGE_BASE}:latest"
          echo "Pushed: ${IMAGE_BASE}:latest"

          REF="${GITHUB_REF:-}"
          if echo "$REF" | grep -q '^refs/tags/v'; then
            VERSION="${REF#refs/tags/}"
            docker tag "${SHA_TAG}" "${IMAGE_BASE}:${VERSION}"
            docker push "${IMAGE_BASE}:${VERSION}"
            echo "Pushed: ${IMAGE_BASE}:${VERSION}"
          fi
