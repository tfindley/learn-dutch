# =============================================================================
# CI/CD — Build, test, and push container image
# =============================================================================
#
# OVERVIEW
# --------
# Tag-driven release pipeline.
#   - Pushing a v* tag → one build that pushes :sha-<sha> + :<version> + :latest
#   - schedule         → weekly Alpine-patch refresh of the latest tagged release
#   - workflow_dispatch → manual rebuild (publishes from the dispatched ref)
#
# Pushes to `main` alone do NOT build. Cut a release by creating a v* tag.
#
# RUNNER
# ------
#   docker  — x86_64 Linux runner (gitea/act_runner, Alpine-based)
#
# SECRETS (set in Repository → Settings → Actions → Secrets)
# -------
# Required:
#   CI_REGISTRY_HOST   — Registry hostname
#   CI_REGISTRY_USER   — Registry username
#   CI_REGISTRY_TOKEN  — Registry password / personal access token
#
# Optional:
#   CA_CERT_URL  — URL to an internal CA certificate bundle. Passed to
#                  `docker build` so the Node build stage can fetch npm
#                  packages through an internal proxy with a private CA.
#   VITE_GA_ID   — Google Analytics 4 Measurement ID (e.g. G-XXXXXXXXXX).
#                  Injected at build time via Vite. Omit to disable analytics.
# =============================================================================

name: Build Container Image

on:
  push:
    tags:
      - "v*"
    paths-ignore:
      - "*.md"
  # Weekly rebuild of the most recent tagged release. `apk upgrade --no-cache`
  # in the Dockerfile picks up the latest Alpine security patches, so :latest
  # stays fresh even between releases.
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ===========================================================================
  # JOB: build-test-push
  # ===========================================================================
  build-test-push:

    runs-on:
      - docker

    steps:

      # Install tools required by subsequent steps.
      # nodejs  — required by the actions/checkout JavaScript action
      # docker-cli — the `docker` command (client only, no daemon)
      - name: Install prerequisites
        shell: sh
        run: |
          set -eu
          apk add --no-cache git nodejs docker-cli docker-cli-buildx

      - name: Checkout
        uses: https://github.com/actions/checkout@v4
        with:
          # Need full history so the schedule trigger can resolve the latest v* tag.
          fetch-depth: 0

      # On a scheduled run, GITHUB_REF points at the default branch (main),
      # but we want :latest to track the most recent v* tag — not whatever is
      # currently on main. Resolve the latest tag and check it out so the rest
      # of the pipeline behaves as if a tag push had happened.
      - name: Resolve target ref (schedule → latest v* tag)
        shell: sh
        run: |
          set -eu
          if [ "${GITHUB_EVENT_NAME:-}" = "schedule" ]; then
            LATEST=$(git tag --list 'v*' --sort=-v:refname | head -n1)
            if [ -z "$LATEST" ]; then
              echo "No v* tag found; aborting scheduled rebuild."
              exit 1
            fi
            echo "Scheduled rebuild — checking out tag: ${LATEST}"
            git checkout "$LATEST"
            echo "BUILD_REF=refs/tags/${LATEST}"   >> "$GITHUB_ENV"
            echo "BUILD_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"
          fi

      - name: Log in to registry
        env:
          CI_REGISTRY_HOST:  ${{ secrets.CI_REGISTRY_HOST }}
          CI_REGISTRY_USER:  ${{ secrets.CI_REGISTRY_USER }}
          CI_REGISTRY_TOKEN: ${{ secrets.CI_REGISTRY_TOKEN }}
        run: |
          set -eu
          [ -n "${CI_REGISTRY_HOST:-}" ] || { echo "CI_REGISTRY_HOST missing"; exit 1; }
          echo "$CI_REGISTRY_TOKEN" | docker login "$CI_REGISTRY_HOST" \
            -u "$CI_REGISTRY_USER" --password-stdin

      # -----------------------------------------------------------------------
      # BUILD
      # -----------------------------------------------------------------------
      - name: Build image
        shell: sh
        env:
          CI_REGISTRY_HOST:    ${{ secrets.CI_REGISTRY_HOST }}
          REPO_OWNER:          ${{ github.repository_owner }}
          REPO_NAME:           ${{ github.event.repository.name }}
          GITHUB_SHA_FALLBACK: ${{ github.sha }}
          GITHUB_REF_FALLBACK: ${{ github.ref }}
          CA_CERT_URL:         ${{ secrets.CA_CERT_URL }}
          VITE_GA_ID:          ${{ secrets.VITE_GA_ID }}
        run: |
          set -eu

          # BUILD_SHA / BUILD_REF are set by the Resolve step on schedule runs.
          COMMIT_SHA="${BUILD_SHA:-$GITHUB_SHA_FALLBACK}"
          REF="${BUILD_REF:-$GITHUB_REF_FALLBACK}"

          IMAGE_BASE=$(printf "%s/%s/%s" "$CI_REGISTRY_HOST" "$REPO_OWNER" "$REPO_NAME" \
            | tr '[:upper:]' '[:lower:]')

          SHA_SHORT=$(echo "$COMMIT_SHA" | cut -c1-12)
          SHA_TAG="${IMAGE_BASE}:sha-${SHA_SHORT}"

          if echo "$REF" | grep -q '^refs/tags/v'; then
            APP_VERSION="${REF#refs/tags/}"
          else
            APP_VERSION="sha-${SHA_SHORT}"
          fi

          BUILD_ARGS="--build-arg APP_VERSION=${APP_VERSION}"
          if [ -n "${CA_CERT_URL:-}" ]; then
            BUILD_ARGS="$BUILD_ARGS --build-arg CA_CERT_URL=${CA_CERT_URL}"
          fi
          if [ -n "${VITE_GA_ID:-}" ]; then
            BUILD_ARGS="$BUILD_ARGS --build-arg VITE_GA_ID=${VITE_GA_ID}"
          fi

          # shellcheck disable=SC2086
          docker build \
            -t "${SHA_TAG}" \
            --load \
            ${BUILD_ARGS} \
            --label "org.opencontainers.image.source=${GITHUB_SERVER_URL:-}/${GITHUB_REPOSITORY:-}" \
            --label "org.opencontainers.image.revision=${COMMIT_SHA}" \
            --label "org.opencontainers.image.created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            .

          echo "${SHA_TAG}" > /tmp/image_tag
          echo "${IMAGE_BASE}" > /tmp/image_base

      # -----------------------------------------------------------------------
      # TEST
      # -----------------------------------------------------------------------
      # The act_runner is itself a container. Port-publishing (-p host:container)
      # exposes ports on the *host*, not inside the runner — so localhost:<port>
      # won't reach the test container. Instead we start the container without
      # port-publishing and connect directly to its bridge IP on port 80.
      - name: Test — nginx serves app
        shell: sh
        run: |
          set -eu
          IMAGE=$(cat /tmp/image_tag)
          echo "Testing image: ${IMAGE}"

          # Test nginx configuration is valid.
          docker run --rm "${IMAGE}" nginx -t
          echo "nginx config: OK"

          # Test that the built assets exist in the image.
          docker run --rm "${IMAGE}" ls /usr/share/nginx/html/index.html
          echo "index.html: OK"

          docker run --rm "${IMAGE}" sh -c '
            ls /usr/share/nginx/html/assets/*.js | head -1 | grep -q "." \
              || { echo "No JS assets found"; exit 1; }
            echo "JS assets: OK"
          '

      # -----------------------------------------------------------------------
      # PUSH
      # -----------------------------------------------------------------------
      # Push :sha-<sha> on every run.
      # On a v* tag (push event OR schedule-resolved): also push :<version> and
      # update :latest. workflow_dispatch from a non-tag ref publishes only
      # :sha-<sha> — :latest is reserved for tagged releases.
      - name: Push image
        shell: sh
        env:
          GITHUB_REF_FALLBACK: ${{ github.ref }}
        run: |
          set -eu
          SHA_TAG=$(cat /tmp/image_tag)
          IMAGE_BASE=$(cat /tmp/image_base)

          docker push "${SHA_TAG}"
          echo "Pushed: ${SHA_TAG}"

          REF="${BUILD_REF:-$GITHUB_REF_FALLBACK}"
          if echo "$REF" | grep -q '^refs/tags/v'; then
            VERSION="${REF#refs/tags/}"
            docker tag "${SHA_TAG}" "${IMAGE_BASE}:${VERSION}"
            docker push "${IMAGE_BASE}:${VERSION}"
            echo "Pushed: ${IMAGE_BASE}:${VERSION}"

            docker tag "${SHA_TAG}" "${IMAGE_BASE}:latest"
            docker push "${IMAGE_BASE}:latest"
            echo "Pushed: ${IMAGE_BASE}:latest"
          fi
